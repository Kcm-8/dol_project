<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>돌려쓰기 · 함께 읽고 쓰고 고친다</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: #E8E2D2; padding: 24px 12px; }

.gt-root {
  --paper: #F1ECE1;
  --paper-deep: #E8E2D2;
  --ink: #232A34;
  --ink-soft: #6B7280;
  --ink-faint: #9A9587;
  --pen: #B23A2E;
  --pen-soft: #D8B9B4;
  --seal: #3F6B52;
  --seal-soft: #CFDCD2;
  --grid: #DAD2C0;
  --card: #FBF9F3;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--grid);
  border-radius: 4px;
  overflow: hidden;
  line-height: 1.6;
  font-size: 14.5px;
  max-width: 900px;
  margin: 0 auto;
}

.gt-serif { font-family: 'Noto Serif KR', serif; }
.gt-mono { font-family: 'IBM Plex Mono', monospace; letter-spacing: -0.02em; }

.gt-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; border-bottom: 1px solid var(--grid);
  background: var(--paper-deep);
}
.gt-title { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 20px; letter-spacing: -0.01em; }
.gt-title .accent { color: var(--pen); }
.gt-sub { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }
.gt-user-box { display: flex; align-items: center; gap: 10px; font-size: 12.5px; }
.gt-user-badge {
  background: var(--seal); color: #fff; border-radius: 50%;
  width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 13px;
}
.gt-admin-badge {
  font-size: 10px; font-family: 'IBM Plex Mono', monospace; background: var(--pen); color: #fff;
  padding: 1px 6px; border-radius: 2px; margin-left: 6px; vertical-align: middle;
}
.gt-user-name { font-weight: 500; }
.gt-user-change { color: var(--ink-soft); text-decoration: underline; cursor: pointer; background: none; border: none; font-size: 11.5px; padding: 0; font-family: inherit; }

.gt-body { display: flex; min-height: 520px; }

.gt-rail {
  width: 168px; flex-shrink: 0; border-right: 1px solid var(--grid);
  background: var(--paper); padding: 18px 0;
}
.gt-stage {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 18px; cursor: pointer; position: relative;
  border-left: 3px solid transparent;
}
.gt-stage:hover { background: rgba(0,0,0,0.03); }
.gt-stage.active { background: var(--card); border-left-color: var(--pen); }
.gt-stage-num {
  font-family: 'IBM Plex Mono', monospace; font-size: 10.5px;
  width: 22px; height: 22px; border-radius: 50%; border: 1.3px solid var(--ink-faint);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
  color: var(--ink-soft);
}
.gt-stage.active .gt-stage-num { border-color: var(--pen); color: var(--pen); font-weight: 700; }
.gt-stage-label { font-size: 13px; font-weight: 500; }
.gt-stage-hint { font-size: 10.5px; color: var(--ink-faint); margin-top: 1px; }

.gt-main { flex: 1; padding: 22px 26px; overflow-y: auto; max-height: 640px; }

.gt-h { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 17px; margin: 0 0 4px; }
.gt-desc { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 18px; }

.gt-card {
  background: var(--card); border: 1px solid var(--grid); border-radius: 3px;
  padding: 16px 18px; margin-bottom: 14px; position: relative;
}
.gt-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
.gt-card-title { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 15px; }
.gt-card-meta { font-size: 11px; color: var(--ink-faint); margin-top: 2px; }
.gt-tag {
  display: inline-block; font-size: 10.5px; font-family: 'IBM Plex Mono', monospace;
  padding: 2px 7px; border-radius: 2px; border: 1px solid var(--grid); color: var(--ink-soft);
  margin-right: 5px;
}
.gt-tag.summary { border-color: #9BB3C9; color: #375374; background: #EAF0F5; }
.gt-tag.opinion { border-color: #C9A992; color: #7A4A2C; background: #F5EDE6; }
.gt-tag.anon { border-color: var(--ink-faint); color: var(--ink-soft); background: #EDEAE0; }

.gt-stamp {
  position: absolute; top: 14px; right: 16px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
  color: var(--pen); border: 1.4px solid var(--pen); border-radius: 50%;
  width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
  transform: rotate(-8deg); opacity: 0.85; text-align: center; line-height: 1.1;
}
.gt-stamp.empty { color: var(--ink-faint); border-color: var(--grid); }

textarea, input[type=text], input[type=password] {
  width: 100%; font-family: 'Noto Sans KR', sans-serif; font-size: 13.5px;
  border: 1px solid var(--grid); border-radius: 3px; padding: 9px 11px;
  background: #fff; color: var(--ink); resize: vertical;
}
textarea:focus, input:focus, select:focus { outline: 2px solid var(--seal); outline-offset: 1px; }
select {
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 8px 10px;
  border: 1px solid var(--grid); border-radius: 3px; background: #fff; color: var(--ink);
}
label.gt-field-label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-soft); margin: 14px 0 5px; }
label.gt-field-label:first-child { margin-top: 0; }

.gt-manuscript {
  background-image:
    linear-gradient(to right, var(--grid) 1px, transparent 1px),
    linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
  background-size: 1.62em 1.9em;
  font-family: 'Noto Serif KR', serif; font-size: 14.5px; line-height: 1.9;
  padding: 10px 12px; min-height: 160px;
}

.gt-btn {
  font-family: 'Noto Sans KR', sans-serif; font-size: 12.5px; font-weight: 500;
  border: 1.3px solid var(--ink); background: var(--ink); color: var(--paper);
  border-radius: 3px; padding: 8px 16px; cursor: pointer;
}
.gt-btn:hover { background: #3a4352; }
.gt-btn.ghost { background: transparent; color: var(--ink); border-color: var(--grid); }
.gt-btn.ghost:hover { background: rgba(0,0,0,0.04); border-color: var(--ink-faint); }
.gt-btn.danger { background: var(--pen); border-color: var(--pen); color: #fff; }
.gt-btn.seal { background: var(--seal); border-color: var(--seal); color: #fff; }
.gt-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.gt-btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; align-items: center; }

.gt-empty {
  border: 1.5px dashed var(--grid); border-radius: 4px; padding: 26px;
  text-align: center; color: var(--ink-soft); font-size: 12.5px;
}

.gt-progress-bar { display: flex; gap: 4px; margin: 6px 0 16px; }
.gt-progress-seg { flex: 1; height: 5px; border-radius: 2px; background: var(--grid); }
.gt-progress-seg.done { background: var(--seal); }

.gt-rubric-row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; gap: 10px; }
.gt-rubric-label { font-size: 12.5px; flex-shrink: 0; width: 128px; }
.gt-rubric-scale { display: flex; gap: 4px; }
.gt-rubric-dot {
  width: 26px; height: 26px; border-radius: 50%; border: 1.3px solid var(--grid);
  display: flex; align-items: center; justify-content: center; font-size: 11px;
  font-family: 'IBM Plex Mono', monospace; cursor: pointer; background: #fff; color: var(--ink-soft);
}
.gt-rubric-dot.sel { background: var(--seal); border-color: var(--seal); color: #fff; font-weight: 600; }

.gt-quote-block {
  border-left: 2.5px solid var(--grid); padding: 8px 0 8px 12px; margin: 4px 0;
  font-size: 12.5px; color: var(--ink-soft);
}

.gt-discuss-msg { padding: 9px 0; border-bottom: 1px solid var(--grid); }
.gt-discuss-msg:last-child { border-bottom: none; }
.gt-discuss-author { font-weight: 600; font-size: 12.5px; }
.gt-discuss-time { font-size: 10.5px; color: var(--ink-faint); margin-left: 6px; }
.gt-discuss-text { font-size: 13px; margin-top: 3px; white-space: pre-wrap; }

.gt-anon-toggle { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-soft); margin-top: 10px; }
.gt-anon-toggle input { width: auto; }

.gt-auth-wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 460px; padding: 40px 20px; text-align: center;
}
.gt-auth-tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--paper-deep); border-radius: 3px; padding: 3px; }
.gt-auth-tab { padding: 7px 18px; font-size: 12.5px; border-radius: 2px; cursor: pointer; color: var(--ink-soft); }
.gt-auth-tab.active { background: var(--card); color: var(--ink); font-weight: 600; }
.gt-auth-form { width: 100%; max-width: 300px; text-align: left; }
.gt-auth-err { font-size: 11.5px; color: var(--pen); margin-top: 10px; min-height: 14px; }

.gt-q-list { list-style: none; padding: 0; margin: 6px 0 0; }
.gt-q-list li { font-size: 13px; padding: 4px 0 4px 18px; position: relative; }
.gt-q-list li:before { content: 'Q'; position: absolute; left: 0; top: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--pen); font-weight: 700; }

.gt-warn { font-size: 11.5px; color: var(--pen); margin-top: 6px; }
.gt-note { font-size: 11.5px; color: var(--ink-soft); background: var(--paper-deep); border-radius: 3px; padding: 8px 10px; margin: 10px 0 0; }
.gt-loading { text-align: center; padding: 60px 20px; color: var(--ink-soft); font-size: 13px; }

@media (max-width: 640px) {
  .gt-body { flex-direction: column; }
  .gt-rail { width: 100%; display: flex; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid var(--grid); }
  .gt-stage { flex-direction: column; align-items: center; text-align: center; border-left: none; border-bottom: 3px solid transparent; flex-shrink: 0; width: 90px; }
  .gt-stage.active { border-left: none; border-bottom-color: var(--pen); }
  .gt-stage-hint { display: none; }
}
  /* ==========================================
   모바일 및 태블릿 UX/UI 최적화 (추가본)
   ========================================== */
@media (max-width: 768px) {
  /* 1. 바깥 여백 스마트폰 화면에 맞게 최적화 */
  body { 
    padding: 8px 4px !important; 
    background: #E8E2D2;
  }
  
  .gt-root {
    border: none !important;
    border-radius: 0 !important;
  }

  /* 2. 상단 바 글자 크기 조정 및 정렬 */
  .gt-topbar {
    padding: 12px 16px !important;
    flex-direction: column;
    align-items: flex-start !important;
    gap: 12px;
  }
  .gt-title { font-size: 17px !important; }
  .gt-user-box { width: 100%; justify-content: flex-start; border-top: 1px dashed var(--grid); padding-top: 8px; }

  /* 3. 본문 스크롤 영역 제한 해제 (모바일은 브라우저 자체 스크롤이 자연스러움) */
  .gt-main { 
    max-height: none !important; 
    padding: 16px 14px !important; 
  }

  /* 4. 터치 UX 개선: 모바일 입력창과 버튼 크기 키우기 */
  textarea, input[type=text], input[type=password], select, .gt-btn {
    min-height: 44px !important; /* 손가락 터치하기 편한 최소 높이 */
    font-size: 14.5px !important; /* 아이폰에서 포커스 시 화면 확대되는 현상 방지 */
    padding: 10px 12px !important;
  }
  
  /* 모바일에서는 버튼들이 가로로 너무 좁게 붙지 않고 시원하게 배치되도록 */
  .gt-btn-row {
    display: flex;
    flex-direction: column;
    width: 100%;
    gap: 8px !important;
  }
  .gt-btn-row .gt-btn {
    width: 100% !important;
    text-align: center;
  }

  /* 5. 원고지 스타일 입력창 모바일 너비 최적화 */
  .gt-manuscript {
    font-size: 14px !important;
    line-height: 1.8 !important;
    padding: 8px !important;
  }

  /* 6. 동료평가 채점표 점수(라디오 버튼) 터치 영역 대폭 확대 */
  .gt-rubric-row {
    flex-direction: column;
    align-items: flex-start !important;
    gap: 6px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--grid);
  }
  .gt-rubric-row:last-child { border-bottom: none; }
  .gt-rubric-scale {
    width: 100%;
    justify-content: space-between; /* 1~5점 버튼이 가로로 균등하게 꽉 차도록 */
  }
  .gt-rubric-dot {
    width: 44px !important;  /* 손가락 터치 픽셀 크기 확보 */
    height: 44px !important;
    font-size: 14px !important;
  }
  
  /* 7. 회원가입/로그인 폼 모바일 가로 꽉 차게 변경 */
  .gt-auth-form {
    max-width: 100% !important;
    width: 100% !important;
  }
}
</style>
</head>
<body>

<div class="gt-root" id="gtRoot">
  <div class="gt-topbar">
    <div>
      <div class="gt-title">돌려쓰기 <span class="accent">·</span> 함께 읽고 쓰고 고치는 교실</div>
      <div class="gt-sub">같은 글을 읽고, 스스로 쓰고, 서로 평가하며 문해력을 기릅니다</div>
    </div>
    <div class="gt-user-box" id="gtUserBox"></div>
  </div>
  <div id="gtBody"><div class="gt-loading">불러오는 중…</div></div>
</div>

<script>
(function(){

// ============================================================
// Supabase 프로젝트 설정 — 아래 두 값을 본인의 Supabase 프로젝트 값으로 교체하세요.
// Supabase 대시보드 > Project Settings > API 에서 확인할 수 있습니다.
// ============================================================
const SUPABASE_URL = 'https://qqqfqssebppiucodkblg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxcWZxc3NlYnBwaXVjb2RrYmxnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MjU0OTcsImV4cCI6MjA5OTQwMTQ5N30.5YGfN54PtAPUlqR3pgquyZ6bfc1bdpYD_NQpOh7XCi4';
const EMAIL_DOMAIN = '@dolgyu.local'; // 로그인 아이디를 내부적으로 이메일 형식으로 바꾸기 위한 가짜 도메인

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const STAGES = [
  { id: 'read', label: '자료 읽기', hint: '지문 확인' },
  { id: 'write', label: '내 글쓰기', hint: '요약/의견 + 질문' },
  { id: 'peer', label: '동료 평가', hint: '3편 이상 채점' },
  { id: 'self', label: '자기 평가', hint: '내 글 채점' },
  { id: 'discuss', label: '토론', hint: '의견 나누기' },
  { id: 'revise', label: '수정하기', hint: '피드백 반영' },
];

const RUBRIC = [
  { key: 'comprehension', label: '이해도' },
  { key: 'logic', label: '논리성·근거' },
  { key: 'expression', label: '표현력' },
  { key: 'questions', label: '질문의 깊이' },
];

const ALIAS_ADJ = ['고요한','푸른','라온','성실한','이든','흐노는','미쁜','대담한','명랑한','차분한','황망한'];
const ALIAS_NOUN = ['여우','고래','올빼미','다람쥐','너구리','수달','고슴도치','기린','부엉이','물총새','청설모'];
function genAlias(){
  const a = ALIAS_ADJ[Math.floor(Math.random()*ALIAS_ADJ.length)];
  const n = ALIAS_NOUN[Math.floor(Math.random()*ALIAS_NOUN.length)];
  const num = Math.floor(Math.random()*90)+10;
  return `${a} ${n} ${num}`;
}

let state = {
  user: null,        // { id, displayName, anonAlias, isAdmin }
  authMode: 'login',
  authError: '',
  view: 'read',
  articles: [],
  posts: [],
  grades: [],
  discussions: [],
  discussPostId: null,
  gradingPostId: null,
  revisingPostId: null,
  pendingArticleId: null,
  peerArticleId: null,
};

function uid(){ return Math.random().toString(36).slice(2,9); }
function fmtTime(ts){
  const d = new Date(ts);
  return d.toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}
function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function nl2br(s){ return esc(s).replace(/\n/g, '<br>'); }
function nameForPost(p){ return p.is_anonymous ? p.author_alias : p.author_name; }
function nameForGrade(g){ return g.is_anonymous ? g.grader_alias : g.grader_name; }
function nameForMsg(m){ return m.is_anonymous ? m.author_alias : m.author_name; }

// ---------------- data layer ----------------
async function loadProfile(userId){
  const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
  if (error) throw error;
  state.user = { id: data.id, displayName: data.display_name, anonAlias: data.anon_alias, isAdmin: data.is_admin };
}

async function loadAll(){
  const [a, p, g, d] = await Promise.all([
    sb.from('articles').select('*').order('created_at', { ascending: true }),
    sb.from('posts').select('*').order('created_at', { ascending: true }),
    sb.from('grades').select('*').order('created_at', { ascending: true }),
    sb.from('discussions').select('*').order('created_at', { ascending: true }),
  ]);
  state.articles = a.data || [];
  state.posts = (p.data || []).map(x => ({ ...x, revisions: [] }));
  state.grades = g.data || [];
  state.discussions = d.data || [];
  const { data: revs } = await sb.from('post_revisions').select('*').order('created_at', { ascending: true });
  (revs || []).forEach(r => {
    const post = state.posts.find(x => x.id === r.post_id);
    if (post) post.revisions.push(r);
  });
}

function myPosts(){ return state.posts.filter(p => p.author_id === state.user.id); }
function gradesByMeFor(postId){ return state.grades.find(g => g.post_id === postId && g.grader_id === state.user.id && !g.is_self); }
function gradesForPost(postId){ return state.grades.filter(g => g.post_id === postId && !g.is_self); }
function avgScore(postId){
  const gs = gradesForPost(postId);
  if (!gs.length) return null;
  let sum = 0, n = 0;
  gs.forEach(g => RUBRIC.forEach(r => { sum += g.scores[r.key]; n++; }));
  return (sum/n).toFixed(1);
}
function distinctGradedPostsByMe(articleId){
  return state.grades.filter(g => g.grader_id === state.user.id && !g.is_self &&
    state.posts.find(p => p.id === g.post_id && p.article_id === articleId && p.author_id !== state.user.id)
  ).map(g => g.post_id);
}
function selfGradeFor(postId){ return state.grades.find(g => g.post_id === postId && g.grader_id === state.user.id && g.is_self); }

// ---------------- render ----------------
function render(){
  renderUserBox();
  const body = document.getElementById('gtBody');
  if (!state.user) {
    body.innerHTML = renderAuth();
    bindAuth();
    return;
  }
  body.innerHTML = `
    <div class="gt-body">
      <div class="gt-rail">${STAGES.map(s => `
        <div class="gt-stage ${state.view === s.id ? 'active' : ''}" data-view="${s.id}">
          <div class="gt-stage-num">${String(STAGES.indexOf(s)+1).padStart(2,'0')}</div>
          <div>
            <div class="gt-stage-label">${s.label}</div>
            <div class="gt-stage-hint">${s.hint}</div>
          </div>
        </div>`).join('')}
      </div>
      <div class="gt-main" id="gtMain"></div>
    </div>`;
  document.querySelectorAll('.gt-stage').forEach(el => el.addEventListener('click', () => {
    state.view = el.dataset.view; state.discussPostId = null; state.gradingPostId = null; state.revisingPostId = null;
    render();
  }));
  renderMain();
}

function renderUserBox(){
  const box = document.getElementById('gtUserBox');
  if (!state.user) { box.innerHTML = ''; return; }
  box.innerHTML = `
    <div class="gt-user-badge">${esc(state.user.displayName[0])}</div>
    <div><div class="gt-user-name">${esc(state.user.displayName)}${state.user.isAdmin ? '<span class="gt-admin-badge">운영자</span>' : ''}</div></div>
    <button class="gt-user-change" id="gtLogout">로그아웃</button>`;
  document.getElementById('gtLogout').addEventListener('click', async () => {
    await sb.auth.signOut();
    state.user = null; render();
  });
}

function renderAuth(){
  return `
    <div class="gt-auth-wrap">
      <div class="gt-serif" style="font-size:18px;font-weight:600;margin-bottom:16px;">시작하기 전에 로그인해주세요</div>
      <div class="gt-auth-tabs">
        <div class="gt-auth-tab ${state.authMode==='login'?'active':''}" data-mode="login">로그인</div>
        <div class="gt-auth-tab ${state.authMode==='signup'?'active':''}" data-mode="signup">회원가입</div>
      </div>
      <div class="gt-auth-form">
        <label class="gt-field-label">아이디 (예: 학번)</label>
        <input type="text" id="gtAuthId" placeholder="예: 26048" autocomplete="username" />
        ${state.authMode==='signup' ? `
        <label class="gt-field-label">이름 (선생님과 학우에게 표시될 실명)</label>
        <input type="text" id="gtAuthName" placeholder="예: 김청모" />` : ''}
        <label class="gt-field-label">비밀번호</label>
        <input type="password" id="gtAuthPw" placeholder="비밀번호" autocomplete="${state.authMode==='signup'?'new-password':'current-password'}" />
        ${state.authMode==='signup' ? `
        <label class="gt-field-label">비밀번호 확인</label>
        <input type="password" id="gtAuthPw2" placeholder="비밀번호 확인" autocomplete="new-password" />` : ''}
        <div class="gt-btn-row" style="justify-content:center;">
          <button class="gt-btn seal" id="gtAuthSubmit" style="width:100%;">${state.authMode==='signup' ? '가입하고 시작하기' : '로그인'}</button>
        </div>
        <div class="gt-auth-err">${esc(state.authError)}</div>
      </div>
    </div>`;
}
function bindAuth(){
  document.querySelectorAll('.gt-auth-tab').forEach(el => el.addEventListener('click', () => {
    state.authMode = el.dataset.mode; state.authError = ''; render();
  }));
  document.getElementById('gtAuthSubmit').addEventListener('click', async () => {
    const id = document.getElementById('gtAuthId').value.trim().toLowerCase();
    const pw = document.getElementById('gtAuthPw').value;
    if (!id || !pw) { state.authError = '아이디와 비밀번호를 입력해주세요.'; render(); return; }
    const email = id + EMAIL_DOMAIN;
    try {
      if (state.authMode === 'signup') {
        const name = document.getElementById('gtAuthName').value.trim();
        const pw2 = document.getElementById('gtAuthPw2').value;
        if (!name) { state.authError = '이름을 입력해주세요.'; render(); return; }
        if (pw !== pw2) { state.authError = '비밀번호가 일치하지 않습니다.'; render(); return; }
        if (pw.length < 6) { state.authError = '비밀번호는 6자 이상이어야 합니다.'; render(); return; }
        const { data, error } = await sb.auth.signUp({ email, password: pw });
        if (error) throw error;
        let session = data.session;
        if (!session) {
          const r = await sb.auth.signInWithPassword({ email, password: pw });
          if (r.error) throw new Error('가입은 완료되었지만 자동 로그인에 실패했습니다. Supabase의 이메일 인증 설정을 확인해주세요.');
          session = r.data.session;
        }
        const { error: pErr } = await sb.from('profiles').insert({
          id: session.user.id, display_name: name, anon_alias: genAlias(),
        });
        if (pErr) throw pErr;
        await loadProfile(session.user.id);
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw new Error('아이디 또는 비밀번호가 올바르지 않습니다.');
        await loadProfile(data.user.id);
      }
      state.authError = '';
      await loadAll();
      render();
    } catch (e) {
      state.authError = e.message || '오류가 발생했습니다.';
      render();
    }
  });
}

function renderMain(){
  const main = document.getElementById('gtMain');
  if (state.view === 'read') main.innerHTML = viewRead();
  else if (state.view === 'write') main.innerHTML = viewWrite();
  else if (state.view === 'peer') main.innerHTML = viewPeer();
  else if (state.view === 'self') main.innerHTML = viewSelf();
  else if (state.view === 'discuss') main.innerHTML = viewDiscuss();
  else if (state.view === 'revise') main.innerHTML = viewRevise();
  bindMain();
}

// ---------- READ ----------
function viewRead(){
  const list = state.articles.slice().reverse();
  return `
    <div class="gt-h">읽기 자료</div>
    <div class="gt-desc">모두가 같은 글을 읽고 그 글에 대해서만 씁니다.</div>
    ${list.length === 0 ? `<div class="gt-empty">아직 등록된 자료가 없습니다.${state.user.isAdmin ? ' 아래에서 첫 자료를 추가해보세요.' : ' 운영자가 자료를 등록할 때까지 기다려주세요.'}</div>` : list.map(a => `
      <div class="gt-card">
        <div class="gt-card-head">
          <div>
            <div class="gt-card-title gt-serif">${esc(a.title)}</div>
            <div class="gt-card-meta">등록: ${esc(a.added_by_name)} · ${fmtTime(a.created_at)} · 이 글에 대한 글 ${state.posts.filter(p=>p.article_id===a.id).length}편</div>
          </div>
        </div>
        <div class="gt-quote-block">${nl2br(a.body.length > 220 ? a.body.slice(0,220) + '…' : a.body)}</div>
        <div class="gt-btn-row">
          <button class="gt-btn ghost" data-expand="${a.id}">전문 보기</button>
          <button class="gt-btn" data-write="${a.id}">이 글로 쓰기 →</button>
        </div>
        <div id="gt-full-${a.id}" style="display:none;margin-top:10px;"></div>
      </div>`).join('')}
    ${state.user.isAdmin ? `
    <div class="gt-card" style="margin-top:22px;">
      <div class="gt-card-title gt-serif" style="margin-bottom:10px;">새 자료 추가 <span class="gt-admin-badge">운영자</span></div>
      <label class="gt-field-label">제목</label>
      <input type="text" id="gtArtTitle" placeholder="예: 액체 근대에 관하여" />
      <label class="gt-field-label">본문</label>
      <textarea id="gtArtBody" rows="6" placeholder="지문 전체를 붙여넣으세요"></textarea>
      <div class="gt-btn-row"><button class="gt-btn seal" id="gtArtSubmit">자료 등록</button></div>
    </div>` : ''}`;
}
function bindMain(){
  if (state.view === 'read') {
    document.querySelectorAll('[data-expand]').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.expand;
      const box = document.getElementById('gt-full-' + id);
      const a = state.articles.find(x => x.id === id);
      if (box.style.display === 'none') { box.style.display = 'block'; box.innerHTML = `<div class="gt-manuscript" style="background:#fff;">${nl2br(a.body)}</div>`; }
      else box.style.display = 'none';
    }));
    document.querySelectorAll('[data-write]').forEach(el => el.addEventListener('click', () => {
      state.pendingArticleId = el.dataset.write; state.view = 'write'; render();
    }));
    const submitBtn = document.getElementById('gtArtSubmit');
    if (submitBtn) submitBtn.addEventListener('click', async () => {
      const title = document.getElementById('gtArtTitle').value.trim();
      const bodyTxt = document.getElementById('gtArtBody').value.trim();
      if (!title || !bodyTxt) return;
      const { data, error } = await sb.from('articles').insert({
        title, body: bodyTxt, added_by: state.user.id, added_by_name: state.user.displayName,
      }).select().single();
      if (error) { alert('등록 실패: ' + error.message); return; }
      state.articles.push(data);
      render();
    });
  }
  if (state.view === 'write') bindWrite();
  if (state.view === 'peer') bindPeer();
  if (state.view === 'self') bindSelf();
  if (state.view === 'discuss') bindDiscuss();
  if (state.view === 'revise') bindRevise();
}

// ---------- WRITE ----------
function viewWrite(){
  if (state.articles.length === 0) {
    return `<div class="gt-h">내 글쓰기</div><div class="gt-empty">아직 읽을 자료가 없습니다. 운영자가 자료를 등록할 때까지 기다려주세요.</div>`;
  }
  const selectedId = state.pendingArticleId || state.articles[state.articles.length-1].id;
  const already = state.posts.find(p => p.author_id === state.user.id && p.article_id === selectedId);
  if (already) {
    return `
      <div class="gt-h">내 글쓰기</div>
      <div class="gt-note">이 글에 대한 글은 이미 게시했습니다 (${fmtTime(already.created_at)}). 내용을 고치고 싶다면 '수정하기' 단계를 이용하세요.</div>
      <div class="gt-card" style="margin-top:14px;">
        <div class="gt-card-head">
          <div><span class="gt-tag ${already.type==='요약문'?'summary':'opinion'}">${already.type}</span>${already.is_anonymous ? '<span class="gt-tag anon">익명 게시</span>' : ''}</div>
        </div>
        <div class="gt-quote-block">${nl2br(already.content)}</div>
        <ul class="gt-q-list">${already.questions.map(q => `<li>${esc(q)}</li>`).join('')}</ul>
      </div>`;
  }
  return `
    <div class="gt-h">내 글쓰기</div>
    <div class="gt-desc">AI의 도움 없이 스스로 작성해주세요. 요약문 또는 의견문 중 하나를 고르고, 글 말미에 질문 2~3개를 덧붙입니다.</div>
    <label class="gt-field-label">대상 자료</label>
    <select id="gtWriteArticle">${state.articles.map(a => `<option value="${a.id}" ${a.id===selectedId?'selected':''}>${esc(a.title)}</option>`).join('')}</select>
    <label class="gt-field-label">글의 종류</label>
    <select id="gtWriteType">
      <option value="요약문">요약문 — 글의 핵심을 자신의 언어로 정리</option>
      <option value="의견문">의견문 — 글에 대한 자신의 평가와 근거</option>
    </select>
    <label class="gt-field-label">본문 (원고지에 쓰듯 작성해보세요)</label>
    <textarea id="gtWriteContent" class="gt-manuscript" rows="9" placeholder="여기에 작성합니다" onpaste="return false;"></textarea>
    <div class="gt-warn" id="gtPasteWarn" style="display:none;">붙여넣기는 비활성화되어 있습니다 — 직접 작성한 글만 인정됩니다.</div>
    <label class="gt-field-label">질문 (2~3개, 다른 학생과 토론하고 싶은 질문)</label>
    <input type="text" id="gtQ1" placeholder="질문 1" />
    <input type="text" id="gtQ2" style="margin-top:6px;" placeholder="질문 2" />
    <input type="text" id="gtQ3" style="margin-top:6px;" placeholder="질문 3 (선택)" />
    <div class="gt-anon-toggle">
      <input type="checkbox" id="gtWriteAnon" />
      <label for="gtWriteAnon">익명으로 게시 (다른 사람에게는 "${esc(state.user.anonAlias)}" 로 표시됩니다)</label>
    </div>
    <div class="gt-btn-row"><button class="gt-btn seal" id="gtWriteSubmit">게시하기</button></div>
  `;
}
function bindWrite(){
  const content = document.getElementById('gtWriteContent');
  if (content) content.addEventListener('paste', e => {
    e.preventDefault();
    document.getElementById('gtPasteWarn').style.display = 'block';
  });
  const submit = document.getElementById('gtWriteSubmit');
  if (!submit) return;
  submit.addEventListener('click', async () => {
    const articleId = document.getElementById('gtWriteArticle').value;
    const type = document.getElementById('gtWriteType').value;
    const contentVal = document.getElementById('gtWriteContent').value.trim();
    const isAnon = document.getElementById('gtWriteAnon').checked;
    const qs = [document.getElementById('gtQ1').value.trim(), document.getElementById('gtQ2').value.trim(), document.getElementById('gtQ3').value.trim()].filter(Boolean);
    if (!contentVal || qs.length < 2) { alert('본문과 질문 최소 2개를 입력해주세요.'); return; }
    const { data, error } = await sb.from('posts').insert({
      article_id: articleId, author_id: state.user.id, author_name: state.user.displayName,
      author_alias: state.user.anonAlias, is_anonymous: isAnon, type, content: contentVal, questions: qs,
    }).select().single();
    if (error) { alert('게시 실패: ' + error.message); return; }
    data.revisions = [];
    state.posts.push(data);
    state.view = 'peer'; state.pendingArticleId = null;
    render();
  });
}

// ---------- PEER REVIEW ----------
function viewPeer(){
  if (state.articles.length === 0) return `<div class="gt-h">동료 평가</div><div class="gt-empty">아직 자료가 없습니다.</div>`;
  const articleId = state.peerArticleId || (state.articles[state.articles.length-1] || {}).id;
  const candidates = state.posts.filter(p => p.article_id === articleId && p.author_id !== state.user.id);
  const gradedIds = new Set(state.grades.filter(g => g.grader_id === state.user.id && !g.is_self).map(g => g.post_id));
  const myGradedCount = distinctGradedPostsByMe(articleId).length;
  const target = state.gradingPostId ? candidates.find(p => p.id === state.gradingPostId) : null;

  let html = `
    <div class="gt-h">동료 평가</div>
    <div class="gt-desc">다른 학생 3명의 글을 평가하면 '자기 평가' 단계가 열립니다.</div>
    <label class="gt-field-label">평가할 자료</label>
    <select id="gtPeerArticle">${state.articles.map(a => `<option value="${a.id}" ${a.id===articleId?'selected':''}>${esc(a.title)}</option>`).join('')}</select>
    <div class="gt-progress-bar">${[0,1,2].map(i => `<div class="gt-progress-seg ${i < myGradedCount ? 'done':''}"></div>`).join('')}</div>
    <div class="gt-sub" style="margin-bottom:14px;">이 자료에서 ${myGradedCount}편 평가 완료 (3편 이상 필요)</div>`;

  if (candidates.length === 0) {
    html += `<div class="gt-empty">이 자료에 대해 아직 다른 학생의 글이 게시되지 않았습니다.</div>`;
    return html;
  }

  if (target) {
    const existing = gradesByMeFor(target.id);
    html += `
      <div class="gt-card">
        <div class="gt-card-head">
          <div>
            <span class="gt-tag ${target.type==='요약문'?'summary':'opinion'}">${target.type}</span>
            <div class="gt-card-meta">작성자: ${esc(nameForPost(target))} · ${fmtTime(target.created_at)}</div>
          </div>
        </div>
        <div class="gt-quote-block">${nl2br(target.content)}</div>
        <ul class="gt-q-list">${target.questions.map(q => `<li>${esc(q)}</li>`).join('')}</ul>
      </div>
      <div class="gt-card">
        <div class="gt-card-title gt-serif" style="margin-bottom:6px;">채점표</div>
        ${RUBRIC.map(r => `
          <div class="gt-rubric-row">
            <div class="gt-rubric-label">${r.label}</div>
            <div class="gt-rubric-scale" data-rubric="${r.key}">
              ${[1,2,3,4,5].map(n => `<div class="gt-rubric-dot ${existing && existing.scores[r.key]===n ? 'sel':''}" data-val="${n}">${n}</div>`).join('')}
            </div>
          </div>`).join('')}
        <label class="gt-field-label">코멘트 (구체적인 근거를 들어주세요)</label>
        <textarea id="gtPeerComment" rows="3" placeholder="좋았던 점과 보완할 점을 적어주세요">${existing ? esc(existing.feedback) : ''}</textarea>
        <div class="gt-anon-toggle">
          <input type="checkbox" id="gtPeerAnon" ${existing && existing.is_anonymous ? 'checked' : ''} />
          <label for="gtPeerAnon">익명으로 평가 (작성자에게 "${esc(state.user.anonAlias)}" 로 표시됩니다)</label>
        </div>
        <div class="gt-btn-row">
          <button class="gt-btn seal" id="gtPeerSubmit">${existing ? '평가 수정' : '평가 제출'}</button>
          <button class="gt-btn ghost" id="gtPeerBack">목록으로</button>
        </div>
      </div>`;
  } else {
    html += candidates.map(p => {
      const already = gradedIds.has(p.id);
      const my = gradesByMeFor(p.id);
      return `
      <div class="gt-card">
        <div class="gt-card-head">
          <div>
            <span class="gt-tag ${p.type==='요약문'?'summary':'opinion'}">${p.type}</span>
            <div class="gt-card-meta">작성자: ${esc(nameForPost(p))} · ${fmtTime(p.created_at)}</div>
          </div>
          ${already ? `<div class="gt-stamp">${my.scores ? (Object.values(my.scores).reduce((a,b)=>a+b,0)/4).toFixed(1) : ''}</div>` : ''}
        </div>
        <div class="gt-quote-block">${nl2br(p.content.length > 180 ? p.content.slice(0,180)+'…' : p.content)}</div>
        <div class="gt-btn-row">
          <button class="gt-btn ${already?'ghost':''}" data-grade="${p.id}">${already ? '평가 다시 보기' : '평가하기 →'}</button>
        </div>
      </div>`;
    }).join('');
  }
  return html;
}
function bindPeer(){
  const sel = document.getElementById('gtPeerArticle');
  if (sel) sel.addEventListener('change', () => { state.peerArticleId = sel.value; state.gradingPostId = null; renderMain(); });
  document.querySelectorAll('[data-grade]').forEach(el => el.addEventListener('click', () => {
    state.gradingPostId = el.dataset.grade; renderMain();
  }));
  const back = document.getElementById('gtPeerBack');
  if (back) back.addEventListener('click', () => { state.gradingPostId = null; renderMain(); });
  let selection = {};
  document.querySelectorAll('[data-rubric]').forEach(scale => {
    const key = scale.dataset.rubric;
    scale.querySelectorAll('.gt-rubric-dot').forEach(dot => {
      if (dot.classList.contains('sel')) selection[key] = parseInt(dot.dataset.val);
      dot.addEventListener('click', () => {
        selection[key] = parseInt(dot.dataset.val);
        scale.querySelectorAll('.gt-rubric-dot').forEach(d => d.classList.toggle('sel', d === dot));
      });
    });
  });
  const submit = document.getElementById('gtPeerSubmit');
  if (submit) submit.addEventListener('click', async () => {
    if (RUBRIC.some(r => !selection[r.key])) { alert('모든 항목에 점수를 매겨주세요.'); return; }
    const feedback = document.getElementById('gtPeerComment').value.trim();
    const isAnon = document.getElementById('gtPeerAnon').checked;
    const postId = state.gradingPostId;
    const { data, error } = await sb.from('grades').upsert({
      post_id: postId, grader_id: state.user.id, grader_name: state.user.displayName,
      grader_alias: state.user.anonAlias, is_anonymous: isAnon, is_self: false,
      scores: selection, feedback,
    }, { onConflict: 'post_id,grader_id,is_self' }).select().single();
    if (error) { alert('평가 저장 실패: ' + error.message); return; }
    const idx = state.grades.findIndex(g => g.id === data.id);
    if (idx >= 0) state.grades[idx] = data; else state.grades.push(data);
    state.gradingPostId = null;
    renderMain();
  });
}

// ---------- SELF GRADE ----------
function viewSelf(){
  const mine = myPosts();
  if (mine.length === 0) return `<div class="gt-h">자기 평가</div><div class="gt-empty">아직 게시한 글이 없습니다. 먼저 '내 글쓰기'를 완료하세요.</div>`;
  let html = `<div class="gt-h">자기 평가</div><div class="gt-desc">같은 자료에서 동료 3편 이상을 채점하면 해당 자료에 대한 내 글의 자기 평가가 열립니다.</div>`;
  html += mine.map(p => {
    const article = state.articles.find(a => a.id === p.article_id);
    const gradedCount = distinctGradedPostsByMe(p.article_id).length;
    const unlocked = gradedCount >= 3;
    const peerGrades = gradesForPost(p.id);
    const my = selfGradeFor(p.id);
    return `
      <div class="gt-card">
        <div class="gt-card-head">
          <div>
            <span class="gt-tag ${p.type==='요약문'?'summary':'opinion'}">${p.type}</span>
            <div class="gt-card-meta">자료: ${esc(article ? article.title : '삭제된 자료')}</div>
          </div>
          ${peerGrades.length ? `<div class="gt-stamp">${avgScore(p.id)}</div>` : `<div class="gt-stamp empty">-</div>`}
        </div>
        <div class="gt-quote-block">${nl2br(p.content.length > 180 ? p.content.slice(0,180)+'…' : p.content)}</div>
        ${!unlocked ? `<div class="gt-note">이 자료에서 동료 평가 ${gradedCount}/3 완료 — 3편을 채점하면 자기 평가가 열립니다.</div>` : (my ? renderSelfGradeReadonly(my) : renderSelfGradeForm(p.id))}
      </div>`;
  }).join('');
  return html;
}
function renderSelfGradeReadonly(my){
  return `
    <div class="gt-note">
      ${RUBRIC.map(r => `${r.label} ${my.scores[r.key]}`).join(' · ')}
      <div style="margin-top:6px;white-space:pre-wrap;">${esc(my.feedback)}</div>
    </div>`;
}
function renderSelfGradeForm(postId){
  return `
    <div class="gt-card" style="background:#fff;margin-top:10px;margin-bottom:0;box-shadow:none;">
      ${RUBRIC.map(r => `
        <div class="gt-rubric-row">
          <div class="gt-rubric-label">${r.label}</div>
          <div class="gt-rubric-scale" data-selfrubric="${r.key}" data-post="${postId}">
            ${[1,2,3,4,5].map(n => `<div class="gt-rubric-dot" data-val="${n}">${n}</div>`).join('')}
          </div>
        </div>`).join('')}
      <label class="gt-field-label">동료들의 평가와 비교했을 때, 내 글을 어떻게 평가하나요?</label>
      <textarea id="gtSelfComment-${postId}" rows="3" placeholder="잘한 점, 아쉬운 점, 동료 피드백과의 차이를 적어보세요"></textarea>
      <div class="gt-btn-row"><button class="gt-btn seal" data-selfsubmit="${postId}">자기 평가 제출</button></div>
    </div>`;
}
function bindSelf(){
  const selfSelections = {};
  document.querySelectorAll('[data-selfrubric]').forEach(scale => {
    const key = scale.dataset.selfrubric, postId = scale.dataset.post;
    selfSelections[postId] = selfSelections[postId] || {};
    scale.querySelectorAll('.gt-rubric-dot').forEach(dot => dot.addEventListener('click', () => {
      selfSelections[postId][key] = parseInt(dot.dataset.val);
      scale.querySelectorAll('.gt-rubric-dot').forEach(d => d.classList.toggle('sel', d === dot));
    }));
  });
  document.querySelectorAll('[data-selfsubmit]').forEach(btn => btn.addEventListener('click', async () => {
    const postId = btn.dataset.selfsubmit;
    const sel = selfSelections[postId] || {};
    if (RUBRIC.some(r => !sel[r.key])) { alert('모든 항목에 점수를 매겨주세요.'); return; }
    const feedback = document.getElementById('gtSelfComment-' + postId).value.trim();
    const { data, error } = await sb.from('grades').upsert({
      post_id: postId, grader_id: state.user.id, grader_name: state.user.displayName,
      grader_alias: state.user.anonAlias, is_anonymous: false, is_self: true,
      scores: sel, feedback,
    }, { onConflict: 'post_id,grader_id,is_self' }).select().single();
    if (error) { alert('저장 실패: ' + error.message); return; }
    state.grades.push(data);
    renderMain();
  }));
}

// ---------- DISCUSS ----------
function viewDiscuss(){
  if (!state.discussPostId) {
    const list = state.posts.slice().reverse();
    if (list.length === 0) return `<div class="gt-h">토론</div><div class="gt-empty">아직 게시된 글이 없습니다.</div>`;
    return `
      <div class="gt-h">토론</div>
      <div class="gt-desc">글을 골라 그 글의 질문에 답하거나 평가에 대해 이야기해보세요.</div>
      ${list.map(p => {
        const article = state.articles.find(a => a.id === p.article_id);
        const count = state.discussions.filter(d => d.post_id === p.id).length;
        return `
        <div class="gt-card">
          <div class="gt-card-head">
            <div>
              <span class="gt-tag ${p.type==='요약문'?'summary':'opinion'}">${p.type}</span>
              <div class="gt-card-meta">${esc(nameForPost(p))} · ${esc(article ? article.title : '')} · 댓글 ${count}개</div>
            </div>
          </div>
          <ul class="gt-q-list">${p.questions.map(q => `<li>${esc(q)}</li>`).join('')}</ul>
          <div class="gt-btn-row"><button class="gt-btn ghost" data-opendiscuss="${p.id}">토론 열기 →</button></div>
        </div>`;
      }).join('')}`;
  }
  const p = state.posts.find(x => x.id === state.discussPostId);
  const article = state.articles.find(a => a.id === p.article_id);
  const msgs = state.discussions.filter(d => d.post_id === p.id);
  return `
    <button class="gt-btn ghost" id="gtDiscussBack" style="margin-bottom:14px;">← 목록으로</button>
    <div class="gt-card">
      <span class="gt-tag ${p.type==='요약문'?'summary':'opinion'}">${p.type}</span>
      <div class="gt-card-meta" style="margin-bottom:8px;">${esc(nameForPost(p))} · ${esc(article ? article.title : '')}</div>
      <div class="gt-quote-block">${nl2br(p.content)}</div>
      <ul class="gt-q-list">${p.questions.map(q => `<li>${esc(q)}</li>`).join('')}</ul>
    </div>
    <div class="gt-card">
      <div class="gt-card-title gt-serif" style="margin-bottom:8px;">토론 (${msgs.length})</div>
      ${msgs.length === 0 ? `<div class="gt-desc" style="margin:0;">첫 댓글을 남겨보세요.</div>` : msgs.map(m => `
        <div class="gt-discuss-msg">
          <span class="gt-discuss-author">${esc(nameForMsg(m))}</span><span class="gt-discuss-time">${fmtTime(m.created_at)}</span>
          <div class="gt-discuss-text">${nl2br(m.message)}</div>
        </div>`).join('')}
      <label class="gt-field-label">댓글 남기기</label>
      <textarea id="gtDiscussInput" rows="2" placeholder="질문에 답하거나 의견을 남겨보세요"></textarea>
      <div class="gt-anon-toggle">
        <input type="checkbox" id="gtDiscussAnon" />
        <label for="gtDiscussAnon">익명으로 남기기 ("${esc(state.user.anonAlias)}" 로 표시)</label>
      </div>
      <div class="gt-btn-row"><button class="gt-btn seal" id="gtDiscussSubmit">댓글 등록</button></div>
    </div>`;
}
function bindDiscuss(){
  document.querySelectorAll('[data-opendiscuss]').forEach(el => el.addEventListener('click', () => {
    state.discussPostId = el.dataset.opendiscuss; renderMain();
  }));
  const back = document.getElementById('gtDiscussBack');
  if (back) back.addEventListener('click', () => { state.discussPostId = null; renderMain(); });
  const submit = document.getElementById('gtDiscussSubmit');
  if (submit) submit.addEventListener('click', async () => {
    const input = document.getElementById('gtDiscussInput');
    const msg = input.value.trim();
    if (!msg) return;
    const isAnon = document.getElementById('gtDiscussAnon').checked;
    const { data, error } = await sb.from('discussions').insert({
      post_id: state.discussPostId, author_id: state.user.id, author_name: state.user.displayName,
      author_alias: state.user.anonAlias, is_anonymous: isAnon, message: msg,
    }).select().single();
    if (error) { alert('댓글 등록 실패: ' + error.message); return; }
    state.discussions.push(data);
    renderMain();
  });
}

// ---------- REVISE ----------
function viewRevise(){
  const mine = myPosts();
  if (mine.length === 0) return `<div class="gt-h">수정하기</div><div class="gt-empty">아직 게시한 글이 없습니다.</div>`;
  if (!state.revisingPostId) {
    return `
      <div class="gt-h">수정하기</div>
      <div class="gt-desc">동료 평가와 토론을 참고해 내 글을 고쳐 써보세요. 이전 글은 기록으로 남습니다.</div>
      ${mine.map(p => {
        const article = state.articles.find(a => a.id === p.article_id);
        const g = gradesForPost(p.id);
        return `
        <div class="gt-card">
          <div class="gt-card-head">
            <div>
              <span class="gt-tag ${p.type==='요약문'?'summary':'opinion'}">${p.type}</span>
              <div class="gt-card-meta">${esc(article ? article.title : '')} · 받은 평가 ${g.length}건 · 수정 ${p.revisions.length}회</div>
            </div>
          </div>
          <div class="gt-btn-row"><button class="gt-btn" data-openrevise="${p.id}">이 글 수정하기 →</button></div>
        </div>`;
      }).join('')}`;
  }
  const p = state.posts.find(x => x.id === state.revisingPostId);
  const feedback = gradesForPost(p.id);
  return `
    <button class="gt-btn ghost" id="gtReviseBack" style="margin-bottom:14px;">← 목록으로</button>
    <div class="gt-card">
      <div class="gt-card-title gt-serif" style="margin-bottom:6px;">받은 동료 평가</div>
      ${feedback.length === 0 ? `<div class="gt-desc" style="margin:0;">아직 받은 평가가 없습니다.</div>` : feedback.map(g => `
        <div class="gt-discuss-msg">
          <span class="gt-discuss-author">${esc(nameForGrade(g))}</span>
          <span class="gt-discuss-time">${RUBRIC.map(r=>`${r.label} ${g.scores[r.key]}`).join(' · ')}</span>
          <div class="gt-discuss-text">${nl2br(g.feedback)}</div>
        </div>`).join('')}
    </div>
    ${p.revisions.length > 0 ? `
    <div class="gt-card">
      <div class="gt-card-title gt-serif" style="margin-bottom:6px;">이전 버전 (${p.revisions.length})</div>
      ${p.revisions.map((r,i) => `<div class="gt-quote-block"><span class="gt-mono" style="font-size:10.5px;">v${i+1} · ${fmtTime(r.created_at)}</span><br>${nl2br(r.content)}</div>`).join('')}
    </div>` : ''}
    <div class="gt-card">
      <div class="gt-card-title gt-serif" style="margin-bottom:8px;">수정본 작성</div>
      <textarea id="gtReviseContent" class="gt-manuscript" rows="8">${esc(p.content)}</textarea>
      <label class="gt-field-label">질문 수정</label>
      <input type="text" id="gtRQ1" value="${esc(p.questions[0]||'')}" placeholder="질문 1" />
      <input type="text" id="gtRQ2" style="margin-top:6px;" value="${esc(p.questions[1]||'')}" placeholder="질문 2" />
      <input type="text" id="gtRQ3" style="margin-top:6px;" value="${esc(p.questions[2]||'')}" placeholder="질문 3 (선택)" />
      <div class="gt-btn-row"><button class="gt-btn seal" id="gtReviseSubmit">수정본 게시</button></div>
    </div>`;
}
function bindRevise(){
  document.querySelectorAll('[data-openrevise]').forEach(el => el.addEventListener('click', () => {
    state.revisingPostId = el.dataset.openrevise; renderMain();
  }));
  const back = document.getElementById('gtReviseBack');
  if (back) back.addEventListener('click', () => { state.revisingPostId = null; renderMain(); });
  const submit = document.getElementById('gtReviseSubmit');
  if (submit) submit.addEventListener('click', async () => {
    const p = state.posts.find(x => x.id === state.revisingPostId);
    const newContent = document.getElementById('gtReviseContent').value.trim();
    const qs = [document.getElementById('gtRQ1').value.trim(), document.getElementById('gtRQ2').value.trim(), document.getElementById('gtRQ3').value.trim()].filter(Boolean);
    if (!newContent || qs.length < 2) { alert('본문과 질문 최소 2개를 입력해주세요.'); return; }
    const { data: revData, error: revErr } = await sb.from('post_revisions').insert({
      post_id: p.id, content: p.content, questions: p.questions,
    }).select().single();
    if (revErr) { alert('이력 저장 실패: ' + revErr.message); return; }
    const { error: upErr } = await sb.from('posts').update({
      content: newContent, questions: qs, last_edit_at: new Date().toISOString(),
    }).eq('id', p.id);
    if (upErr) { alert('수정 실패: ' + upErr.message); return; }
    p.revisions.push(revData);
    p.content = newContent; p.questions = qs;
    state.revisingPostId = null;
    renderMain();
  });
}

// ---------- init ----------
async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    try {
      await loadProfile(session.user.id);
      await loadAll();
    } catch (e) {
      state.user = null;
    }
  }
  render();
}
init();

})();
</script>
</body>
</html>
